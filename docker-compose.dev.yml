services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - ./.env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - react-backend-net

  backend:
    build:
      context: ./server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - ./.env.dev
    container_name: server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - react-backend-net
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

networks:
  react-backend-net:
    driver: bridge

volumes:
  postgres_data:
