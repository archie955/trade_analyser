services:
  db:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - react-backend-net

  backend:
    build:
      context: ./server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - server/.env.dev
    container_name: server
    depends_on:
      - db
    environment:
      DATABASE_HOSTNAME: ${DATABASE_HOSTNAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
    ports:
      - "8000:8000"
    networks:
      - react-backend-net

  frontend:
    build:
      context: ./client
      args:
        VITE_BASEURL: /api
    container_name: client
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - react-backend-net

networks:
  react-backend-net:
    driver: bridge

volumes:
  postgres_data: